name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  MARIADB_VERSION: '12.2.2'
  PHP_VERSION: '8.5'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            dist_cmd: dist:linux
          - os: windows-latest
            platform: win
            dist_cmd: dist:win
          - os: macos-latest
            platform: mac
            dist_cmd: dist:mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      # ── PHP ──────────────────────────────────────────────────────────────────

      - name: Download PHP (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p resources/php/linux
          curl -L "https://github.com/crazywhalecc/static-php-cli/releases/download/2.4.0/php-${{ env.PHP_VERSION }}-linux-x86_64.tar.gz" \
            | tar xz -C resources/php/linux

      - name: Download PHP (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force resources/php/win | Out-Null
          $url = "https://windows.php.net/downloads/releases/php-${{ env.PHP_VERSION }}-nts-Win32-vs16-x64.zip"
          Invoke-WebRequest $url -OutFile php.zip
          Expand-Archive php.zip resources/php/win -Force

      - name: Download PHP (macOS)
        if: matrix.platform == 'mac'
        run: |
          mkdir -p resources/php/mac
          curl -L "https://github.com/crazywhalecc/static-php-cli/releases/download/2.4.0/php-${{ env.PHP_VERSION }}-macos-aarch64.tar.gz" \
            | tar xz -C resources/php/mac

      # ── MariaDB ───────────────────────────────────────────────────────────────

      - name: Download MariaDB (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p resources/mysql/linux
          curl -L "https://downloads.mariadb.org/interstitial/mariadb-${{ env.MARIADB_VERSION }}/bintar-linux-systemd-x86_64/mariadb-${{ env.MARIADB_VERSION }}-linux-systemd-x86_64.tar.gz" \
            | tar xz --strip-components=1 -C resources/mysql/linux

      - name: Download MariaDB (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force resources/mysql/win | Out-Null
          $url = "https://downloads.mariadb.org/interstitial/mariadb-${{ env.MARIADB_VERSION }}/winx64-packages/mariadb-${{ env.MARIADB_VERSION }}-winx64.zip"
          Invoke-WebRequest $url -OutFile mariadb.zip
          Expand-Archive mariadb.zip . -Force
          Move-Item "mariadb-${{ env.MARIADB_VERSION }}-winx64/*" resources/mysql/win/

      - name: Download MariaDB (macOS)
        if: matrix.platform == 'mac'
        run: |
          mkdir -p resources/mysql/mac
          curl -L "https://downloads.mariadb.org/interstitial/mariadb-${{ env.MARIADB_VERSION }}/bintar-osx14-arm64/mariadb-${{ env.MARIADB_VERSION }}-osx14-arm64.tar.gz" \
            | tar xz --strip-components=1 -C resources/mysql/mac

      # ── Build ─────────────────────────────────────────────────────────────────

      - name: Build
        run: npm run ${{ matrix.dist_cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sgt-${{ matrix.platform }}
          path: release/
          retention-days: 14
